<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EDF v6 - Enterprise Data Framework</title>

<style>

/* =========================
RESET
========================= */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

:root{
--bg:#04080f;
--panel:#0c1422;
--panel2:#101c2e;
--border:#162236;
--text:#cdd9e8;
--muted:#94a3b8;
--accent:#06b6d4;
--success:#10b981;
--warn:#f59e0b;
--danger:#ef4444;
}

body{
background:var(--bg);
color:var(--text);
font-family:Segoe UI,system-ui,sans-serif;
font-size:13px;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:240px;
background:var(--panel);
border-right:1px solid var(--border);
padding:12px;
overflow:auto;
}

.logo{
font-size:14px;
font-weight:600;
margin-bottom:16px;
}

.nav-item{
padding:8px;
cursor:pointer;
border-radius:4px;
margin-bottom:4px;
color:var(--muted);
}

.nav-item:hover{
background:var(--panel2);
color:var(--text);
}

.nav-item.active{
background:rgba(6,182,212,.08);
color:var(--accent);
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
padding:14px;
border-bottom:1px solid var(--border);
background:var(--panel);
}

.title{
font-size:16px;
font-weight:600;
}

.content{
padding:18px;
overflow:auto;
}

.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:6px;
margin-bottom:14px;
}

.card-header{
padding:10px 12px;
border-bottom:1px solid var(--border);
font-weight:600;
}

.card-body{
padding:12px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
}

.stat{
background:var(--panel);
border:1px solid var(--border);
padding:12px;
border-radius:6px;
}

.stat-num{
font-size:20px;
font-weight:600;
}

.code{
background:#020617;
border:1px solid var(--border);
padding:12px;
border-radius:6px;
font-family:monospace;
font-size:12px;
overflow:auto;
white-space:pre;
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar" id="sidebar"></div>

<div class="main">

<div class="topbar">

<div class="title" id="title">
EDF v6 - Master Index
</div>

</div>

<div class="content" id="content">

</div>

</div>

</div>

<script>

/* =========================
NAV
========================= */

const NAV = [

{ id:"index", label:"Master Index" },
{ id:"pipeline", label:"Pipeline Runner" },
{ id:"scheduler", label:"Scheduler" },
{ id:"migration", label:"Migration Toolkit" },
{ id:"watermark", label:"Watermark" },
{ id:"circuit", label:"Circuit Breaker" },
{ id:"ops", label:"Ops Dashboard" }

]

/* =========================
SIDEBAR
========================= */

function buildSidebar(active){

let html = '<div class="logo">EDF v6</div>'

NAV.forEach(n=>{

html+=`
<div 
class="nav-item ${active===n.id?'active':''}"
onclick="goto('${n.id}')"
>
${n.label}
</div>
`

})

document.getElementById("sidebar").innerHTML = html

}

/* =========================
VIEWS
========================= */

const views = {

index:()=>`

<div class="grid">

<div class="stat">
<div class="stat-num">42</div>
modules
</div>

<div class="stat">
<div class="stat-num">20</div>
oracle tables
</div>

<div class="stat">
<div class="stat-num">26</div>
audit columns
</div>

<div class="stat">
<div class="stat-num">14</div>
runner steps
</div>

</div>

<div class="card">

<div class="card-header">
framework summary
</div>

<div class="card-body">

config driven pipelines  
zero business logic in spark runner  

all transformations stored in oracle  

</div>

</div>

`,

pipeline:()=>`

<div class="card">

<div class="card-header">
spark runner execution flow
</div>

<div class="card-body">

<div class="code">

load config  
apply transform steps  
run dq  
inject audit columns  
write curated  
update watermark  

</div>

</div>

</div>

`,

scheduler:()=>`

<div class="card">

<div class="card-header">
dual scheduler
</div>

<div class="card-body">

autosys + airflow supported  

scheduler config stored in oracle  

same runner command executed  

</div>

</div>

`,

migration:()=>`

<div class="card">

<div class="card-header">
migration paths
</div>

<div class="card-body">

existing spark → edf  

autosys → scheduler config  

onprem → databricks  

</div>

</div>

`,

watermark:()=>`

<div class="card">

<div class="card-header">
incremental processing
</div>

<div class="card-body">

high watermark stored in oracle  

only new records processed  

no duplicates  

</div>

</div>

`,

circuit:()=>`

<div class="card">

<div class="card-header">
circuit breaker states
</div>

<div class="card-body">

closed → normal  

open → blocked  

half open → probe  

</div>

</div>

`,

ops:()=>`

<div class="card">

<div class="card-header">
pipeline health
</div>

<div class="card-body">

dq pass rate  

cost tracking  

sla monitoring  

</div>

</div>

`

}

/* =========================
NAVIGATION
========================= */

function goto(id){

buildSidebar(id)

document.getElementById("title").innerText =
NAV.find(x=>x.id===id).label

document.getElementById("content").innerHTML =
views[id]()

}

/* =========================
INIT
========================= */

goto("index")

</script>

</body>
</html>
